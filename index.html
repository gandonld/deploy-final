<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蜂云装饰客户资料管理系统</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
:root {
  --primary: #e8531a; --primary-dark: #c94310; --primary-light: #fff0eb;
  --secondary: #2d6cdf; --secondary-light: #eaf1ff;
  --success: #1a9e5e; --success-light: #e6f7ef;
  --warning: #e6a817; --warning-light: #fdf6e3;
  --danger: #d63838; --danger-light: #ffeded;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
  --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--gray-50); color: var(--gray-800); line-height:1.6; }
.header { background: #fff; border-bottom: 3px solid var(--primary); padding: 16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.header h1 { font-size:20px; color:var(--primary); }
.header h1 span { color:var(--gray-600); font-weight:400; font-size:14px; margin-left:8px; }
.nav { display:flex; gap:6px; }
.nav-btn { padding:8px 18px; border:2px solid var(--gray-200); border-radius:20px; background:#fff; cursor:pointer; font-size:13px; transition:all .2s; }
.nav-btn:hover, .nav-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.container { max-width:1100px; margin:24px auto; padding:0 16px; }
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
.card-title { font-size:16px; font-weight:600; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid var(--gray-100); display:flex; justify-content:space-between; align-items:center; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
label { display:block; font-size:13px; font-weight:500; color:var(--gray-600); margin-bottom:4px; }
input, select, textarea { width:100%; padding:10px 12px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:14px; transition:border .2s; background:#fff; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
textarea { resize:vertical; min-height:60px; }
.btn { padding:10px 24px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-outline { background:#fff; color:var(--gray-700); border:1.5px solid var(--gray-200); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#b91c1c; }
.btn-sm { padding:6px 14px; font-size:12px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; text-align:center; }
.stat-card .num { font-size:28px; font-weight:700; color:var(--primary); }
.stat-card .label { font-size:12px; color:var(--gray-500); margin-top:4px; }
.customer-card { background:#fff; border:1.5px solid var(--gray-100); border-radius:var(--radius); padding:16px; margin-bottom:12px; transition:all .2s; }
.customer-card:hover { border-color:var(--primary); box-shadow:0 4px 16px rgba(232,83,26,0.10); }
.customer-card .name { font-size:16px; font-weight:600; color:var(--gray-800); }
.customer-card .meta { font-size:12px; color:var(--gray-400); margin:4px 0 8px; }
.customer-card .tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag { padding:3px 10px; border-radius:12px; font-size:11px; }
.tag-orange { background:var(--warning-light); color:#b7791f; }
.tag-blue { background:var(--secondary-light); color:var(--secondary); }
.tag-green { background:var(--success-light); color:var(--success); }
.search-box { width:100%; padding:10px 16px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:14px; margin-bottom:16px; }
.search-box:focus { outline:none; border-color:var(--primary); }
.empty { text-align:center; padding:48px 20px; color:var(--gray-400); }
.empty .icon { font-size:48px; margin-bottom:12px; }
.toast { position:fixed; top:20px; right:20px; padding:14px 24px; border-radius:8px; font-size:14px; font-weight:500; z-index:9999; opacity:0; transition:all .3s; pointer-events:none; }
.toast.show { opacity:1; pointer-events:auto; }
.toast-success { background:var(--success); color:#fff; }
.toast-error { background:var(--danger); color:#fff; }
.toast-warning { background:var(--warning); color:#fff; }
.section-title { font-size:14px; font-weight:600; color:var(--primary); margin:20px 0 10px; padding-left:10px; border-left:3px solid var(--primary); }
.form-actions { display:flex; gap:12px; margin-top:24px; }
.header-actions { display:flex; gap:8px; }
.db-status { font-size:12px; padding:4px 10px; border-radius:12px; background:var(--gray-100); }
.checkbox-group { display:flex; flex-wrap:wrap; gap:6px 14px; margin-bottom:10px; }
.cb-item { display:flex; align-items:center; gap:4px; font-size:12.5px; color:var(--gray-600); cursor:pointer; background:var(--gray-50); padding:4px 10px; border-radius:6px; border:1px solid var(--gray-200); transition:all .15s; }
.cb-item:hover { background:var(--primary-light); border-color:var(--primary); }
.cb-item input[type="checkbox"] { cursor:pointer; accent-color:var(--primary); }
@media(max-width:768px){
  .checkbox-group { gap:4px 8px; }
  .cb-item { font-size:11.5px; padding:3px 7px; }
}

  </style>
</head>
<body>

<div class="header">
  <h1>蜂云装饰客户资料管理系统 <span class="db-status" id="db-status">检测中...</span></h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn btn-outline btn-sm" onclick="syncToCloud()" id="btn-sync" style="display:none;" title="将本地数据同步到云端">☁️ 同步</button>
    <div class="nav">
      <button class="nav-btn active" onclick="navigate('dashboard')">首页</button>
      <button class="nav-btn" onclick="navigate('form')">新建客户</button>
      <button class="nav-btn" onclick="requireAuth(function(){ navigate('list'); })">客户列表</button>
      <button class="nav-btn" onclick="requireAuth(function(){ navigate('backup'); })">备份恢复</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- 首页仪表盘 -->
  <div id="page-dashboard" class="page">
    <div class="stats">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">客户总数</div></div>
      <div class="stat-card"><div class="num" id="stat-month">0</div><div class="label">本月新增</div></div>
      <div class="stat-card"><div class="num" id="stat-budget">0</div><div class="label">预算均值(万)</div></div>
      <div class="stat-card"><div class="num" id="stat-area">0</div><div class="label">面积均值(m²)</div></div>
    </div>
    <div class="card">
      <div class="card-title">最近添加的客户</div>
      <div id="recent-list"></div>
      <div id="recent-empty" class="empty" style="display:none;">
        <div class="icon">📋</div>
        <div>暂无客户资料，点击"新建客户"开始录入</div>
      </div>
    </div>
  </div>

  <!-- 新建/编辑客户 -->
  <div id="page-form" class="page" style="display:none;">
    <div class="card">
      <div class="card-title" id="form-title">新建客户资料</div>
      <input type="hidden" id="f-id">
      <!-- 基本信息 -->
      <div class="section-title">基本信息</div>
      <div class="grid3">
        <div><label>客户姓名 *</label><input id="f-name" placeholder="必填"></div>
        <div><label>联系电话 *</label><input id="f-phone" placeholder="必填"></div>
        <div><label>性别</label><select id="f-gender"><option value="">请选择</option><option>男</option><option>女</option></select></div>
      </div>
      <div class="grid3">
        <div><label>年龄区间</label><select id="f-age"><option value="">请选择</option><option>20-25岁</option><option>25-30岁</option><option>30-35岁</option><option>35-40岁</option><option>40-50岁</option><option>50-60岁</option><option>60岁以上</option></select></div>
        <div><label>职业</label><input id="f-job" placeholder="如：教师、医生、IT、自由职业"></div>
        <div><label>推荐来源</label><select id="f-source"><option value="">请选择</option><option>朋友推荐</option><option>老客户转介绍</option><option>抖音/小红书</option><option>微信朋友圈</option><option>百度/搜索广告</option><option>小区推广</option><option>门店到访</option><option>装修平台</option><option>其他</option></select></div>
      </div>
      <div class="grid3">
        <div><label>是否养宠物</label><select id="f-pet"><option value="">请选择</option><option>是</option><option>否</option></select></div>
        <div><label>宠物类型</label><select id="f-petdetail"><option value="">请选择</option><option>无</option><option>狗</option><option>猫</option><option>猫+狗</option><option>其他小宠</option></select></div>
        <div><label>紧急程度</label><select id="f-urgency"><option value="">请选择</option><option>非常急（一周内）</option><option>较急（一个月内）</option><option>三个月内</option><option>半年内</option><option>不着急，先了解</option></select></div>
      </div>
      <!-- 房屋信息 -->
      <div class="section-title">房屋信息</div>
      <div class="grid3">
        <div><label>房屋面积(m²)</label><input id="f-area" type="number" placeholder="如：120"></div>
        <div><label>户型</label><select id="f-housetype"><option value="">请选择</option><option>一居室</option><option>两居室</option><option>三居室一厅</option><option>三居室两厅</option><option>四居室</option><option>五居室及以上</option><option>复式</option><option>别墅</option><option>LOFT</option></select></div>
        <div><label>房屋类型</label><select id="f-propertytype"><option value="">请选择</option><option>新房（毛坯）</option><option>新房（精装）</option><option>二手房翻新</option><option>老房改造</option><option>局部翻新</option></select></div>
      </div>
      <div class="grid3">
        <div><label>装修地址</label><input id="f-address" placeholder="详细地址（小区名称）"></div>
        <div><label>楼层</label><input id="f-floor" placeholder="如：6层/共18层"></div>
        <div><label>朝向</label><select id="f-direction"><option value="">请选择</option><option>南北通透</option><option>朝南</option><option>朝东南</option><option>朝东</option><option>朝西</option><option>朝北</option><option>东西向</option><option>其他</option></select></div>
      </div>
      <div class="grid3">
        <div><label>房屋年限</label><select id="f-houseage"><option value="">请选择</option><option>新房未入住</option><option>1-3年</option><option>3-5年</option><option>5-10年</option><option>10-15年</option><option>15年以上</option></select></div>
        <div><label>层高(m)</label><input id="f-floorheight" type="number" step="0.1" placeholder="如：2.8"></div>
        <div><label>是否有电梯</label><select id="f-elevator"><option value="">请选择</option><option>有</option><option>无</option><option>多层无电梯</option></select></div>
      </div>
      <!-- 家庭成员 -->
      <div class="section-title">家庭成员</div>
      <div class="grid3">
        <div><label>家庭成员数</label><input id="f-familycount" type="number" placeholder="几口人"></div>
        <div><label>是否有老人</label><select id="f-haselderly"><option value="">请选择</option><option>是</option><option>否</option></select></div>
        <div><label>是否有小孩</label><select id="f-haschildren"><option value="">请选择</option><option>是（0-3岁）</option><option>是（3-12岁）</option><option>是（12岁以上）</option><option>否</option></select></div>
      </div>
      <div class="section-title" style="font-size:13px;color:var(--gray-700);border-left-color:var(--secondary);margin-top:0;">成员特殊需求</div>
      <div class="checkbox-group" id="cg-familynote">
        <label class="cb-item"><input type="checkbox" value="老人需无障碍设施" onchange="updateTextarea('f-familynote','cg-familynote')"> 老人需无障碍设施</label>
        <label class="cb-item"><input type="checkbox" value="小孩需防撞设计" onchange="updateTextarea('f-familynote','cg-familynote')"> 小孩需防撞设计</label>
        <label class="cb-item"><input type="checkbox" value="有孕妇/备孕" onchange="updateTextarea('f-familynote','cg-familynote')"> 有孕妇/备孕</label>
        <label class="cb-item"><input type="checkbox" value="过敏体质（需环保材料）" onchange="updateTextarea('f-familynote','cg-familynote')"> 过敏体质（需环保材料）</label>
        <label class="cb-item"><input type="checkbox" value="老人房需紧急呼叫按钮" onchange="updateTextarea('f-familynote','cg-familynote')"> 老人房需紧急呼叫按钮</label>
        <label class="cb-item"><input type="checkbox" value="需要儿童安全防护" onchange="updateTextarea('f-familynote','cg-familynote')"> 需要儿童安全防护</label>
        <label class="cb-item"><input type="checkbox" value="对噪音敏感" onchange="updateTextarea('f-familynote','cg-familynote')"> 对噪音敏感</label>
        <label class="cb-item"><input type="checkbox" value="需要隔音处理" onchange="updateTextarea('f-familynote','cg-familynote')"> 需要隔音处理</label>
        <label class="cb-item"><input type="checkbox" value="养宠物（需耐磨地面）" onchange="updateTextarea('f-familynote','cg-familynote')"> 养宠物（需耐磨地面）</label>
        <label class="cb-item"><input type="checkbox" value="需要独立衣帽间" onchange="updateTextarea('f-familynote','cg-familynote')"> 需要独立衣帽间</label>
        <label class="cb-item"><input type="checkbox" value="成员有长期居家办公" onchange="updateTextarea('f-familynote','cg-familynote')"> 成员有长期居家办公</label>
        <label class="cb-item"><input type="checkbox" value="经常有老人来访小住" onchange="updateTextarea('f-familynote','cg-familynote')"> 经常有老人来访小住</label>
      </div>
      <textarea id="f-familynote" placeholder="已选项目将自动填入，也可手动补充其他需求"></textarea>
      <!-- 风格偏好 -->
      <div class="section-title">风格偏好</div>
      <div class="grid3">
        <div><label>装修风格</label><select id="f-style"><option value="">请选择</option><option>现代简约</option><option>北欧风</option><option>新中式</option><option>轻奢风</option><option>美式</option><option>法式</option><option>日式/原木</option><option>工业风</option><option>地中海</option><option>混搭</option><option>奶油风</option><option>侘寂风</option><option>其他</option></select></div>
        <div><label>色彩偏好</label><select id="f-color"><option value="">请选择</option><option>浅色系（白/米/灰）</option><option>深色系（黑/灰/棕）</option><option>暖色系（橙/黄/红）</option><option>冷色系（蓝/绿/紫）</option><option>黑白灰极简</option><option>无特别偏好</option></select></div>
        <div><label>是否需要全屋定制</label><select id="f-custom"><option value="">请选择</option><option>是，全部定制</option><option>是，部分定制</option><option>否，成品家具</option><option>待定</option></select></div>
      </div>
      <div><label>参考风格/案例描述</label><textarea id="f-reference" placeholder="如：喜欢小红书上的XX博主风格、参考了XX酒店的装修、偏好简约但不冷清"></textarea></div>
      <!-- 功能区需求 -->
      <div class="section-title">功能区需求</div>
      
      <!-- 客厅 -->
      <div class="section-title" style="font-size:13px;color:var(--gray-700);border-left-color:var(--secondary);">客厅</div>
      <div class="checkbox-group" id="cg-livingroom">
        <label class="cb-item"><input type="checkbox" value="无主灯设计" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 无主灯设计</label>
        <label class="cb-item"><input type="checkbox" value="投影仪/电视墙" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 投影仪/电视墙</label>
        <label class="cb-item"><input type="checkbox" value="大落地窗/采光好" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 大落地窗/采光好</label>
        <label class="cb-item"><input type="checkbox" value="拒绝繁杂吊顶" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 拒绝繁杂吊顶</label>
        <label class="cb-item"><input type="checkbox" value="沙发背景墙" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 沙发背景墙</label>
        <label class="cb-item"><input type="checkbox" value="客厅阳台打通" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 客厅阳台打通</label>
        <label class="cb-item"><input type="checkbox" value="储物柜/展示柜" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 储物柜/展示柜</label>
        <label class="cb-item"><input type="checkbox" value="预留空调位" onchange="updateTextarea('f-need-livingroom','cg-livingroom')"> 预留空调位</label>
      </div>
      <textarea id="f-need-livingroom" placeholder="已选项目将自动填入，也可手动补充其他需求"></textarea>
      
      <!-- 餐厅 -->
      <div class="section-title" style="font-size:13px;color:var(--gray-700);border-left-color:var(--secondary);">餐厅</div>
      <div class="checkbox-group" id="cg-dining">
        <label class="cb-item"><input type="checkbox" value="餐边柜" onchange="updateTextarea('f-need-dining','cg-dining')"> 餐边柜</label>
        <label class="cb-item"><input type="checkbox" value="吧台" onchange="updateTextarea('f-need-dining','cg-dining')"> 吧台</label>
        <label class="cb-item"><input type="checkbox" value="岛台一体" onchange="updateTextarea('f-need-dining','cg-dining')"> 岛台一体</label>
        <label class="cb-item"><input type="checkbox" value="圆桌" onchange="updateTextarea('f-need-dining','cg-dining')"> 圆桌</label>
        <label class="cb-item"><input type="checkbox" value="长桌" onchange="updateTextarea('f-need-dining','cg-dining')"> 长桌</label>
        <label class="cb-item"><input type="checkbox" value="酒柜" onchange="updateTextarea('f-need-dining','cg-dining')"> 酒柜</label>
        <label class="cb-item"><input type="checkbox" value="卡座" onchange="updateTextarea('f-need-dining','cg-dining')"> 卡座</label>
        <label class="cb-item"><input type="checkbox" value="冰箱位" onchange="updateTextarea('f-need-dining','cg-dining')"> 冰箱位</label>
      </div>
      <textarea id="f-need-dining" placeholder="已选项目将自动填入，也可手动补充其他需求"></textarea>
      
      <!-- 厨房 -->
      <div class="section-title" style="font-size:13px;color:var(--gray-700);border-left-color:var(--secondary);">厨房</div>
      <div class="checkbox-group" id="cg-kitchen">
        <label class="cb-item"><input type="checkbox" value="开放式厨房" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 开放式厨房</label>
        <label class="cb-item"><input type="checkbox" value="封闭式厨房" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 封闭式厨房</label>
        <label class="cb-item"><input type="checkbox" value="中岛台" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 中岛台</label>
        <label class="cb-item"><input type="checkbox" value="双开门冰箱" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 双开门冰箱</label>
        <label class="cb-item"><input type="checkbox" value="集成灶" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 集成灶</label>
        <label class="cb-item"><input type="checkbox" value="洗碗机" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 洗碗机</label>
        <label class="cb-item"><input type="checkbox" value="垃圾处理器" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 垃圾处理器</label>
        <label class="cb-item"><input type="checkbox" value="净水器" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 净水器</label>
        <label class="cb-item"><input type="checkbox" value="嵌入式家电" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 嵌入式家电</label>
        <label class="cb-item"><input type="checkbox" value="凉霸" onchange="updateTextarea('f-need-kitchen','cg-kitchen')"> 凉霸</label>

<script>
// ========== 全局变量 ==========
var allCustomers = [];
var AUTH_PWD = '131313';
var authed = false;
var LS_KEY = 'fengyun_customers_data';

// ========== 密码保护 ==========
function requireAuth(callback) {
  if (authed) { callback(); return; }
  var pwd = prompt('请输入访问密码：');
  if (pwd === AUTH_PWD) { authed = true; callback(); }
  else if (pwd !== null) { alert('密码错误！'); }
}

// ========== 导航 ==========
function navigate(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.style.display = 'none'; });
  document.getElementById('page-' + page).style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  if (event && event.target) event.target.classList.add('active');
  if (page === 'dashboard') renderDashboard();
  if (page === 'list') requireAuth(function() { renderList(); });
}

// ========== 云同步 API ==========
var cloudOnline = false;

// API 地址：优先走相对路径（同域），否则走 Railway 后端
var API_BASE = (window.location.hostname === 'diligent-miracle-production-e706.up.railway.app')
  ? '/api'
  : 'https://diligent-miracle-production-e706.up.railway.app/api';

async function api(method, path, body) {
  var opts = { method: method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  var resp = await fetch(API_BASE + path, opts);
  if (!resp.ok) {
    var err = await resp.text();
    throw new Error(err || 'HTTP ' + resp.status);
  }
  return resp.json();
}

async function syncToCloud() {

  showToast('正在同步 ' + localData.length + ' 条数据...', 'warning');
  var ok = 0, fail = 0;
  for (var i = 0; i < localData.length; i++) {
    var s = await saveToCloud(localData[i]);
    if (s) ok++; else fail++;
  }
  if (fail === 0) { cloudOnline = true; updateCloudStatus(); showToast('✅ 全部 ' + ok + ' 条已同步', 'success'); }
  else { showToast('⚠️ ' + ok + ' 成功, ' + fail + ' 失败', 'warning'); }

// ========== 本地存储操作 ==========
function saveToLocal(record) {

  if (idx >= 0) data[idx] = record;
  else data.unshift(record);
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  return data;
}

function loadFromLocal() {
  try { var raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : []; }
  catch(e) { return []; }
}

function deleteFromLocal(id) {
  var data = loadFromLocal().filter(function(c) { return c.id !== id; });

}

function clearLocalData() {
  localStorage.removeItem(LS_KEY);
}

// 手机号脱敏：138xxxx0000
function maskPhone(phone) {
  if (!phone) return '';
  var s = String(phone).replace(/\D/g, '');
  if (s.length >= 7) return s.slice(0, 3) + '****' + s.slice(-4);
  return s.slice(0, 3) + '****';
}

// ========== 备份与恢复 ==========
function backupToJson() {
  var data = loadFromLocal();
  if (data.length === 0) {
    showToast('没有数据可备份', 'error');
    return;
  }
  var backup = {
    version: '1.0',
    backupTime: new Date().toISOString(),
    totalCount: data.length,
    data: data
  };
  var json = JSON.stringify(backup, null, 2);
  var blob = new Blob([json], { type: 'application/json;charset=utf-8;' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '蜂云装饰_备份_' + new Date().toISOString().slice(0,10) + '.json';
  link.click();
  showToast('✅ 已导出备份文件（' + data.length + ' 条数据）', 'success');
  document.getElementById('backup-status').innerHTML = '✅ 备份成功：' + data.length + ' 条客户数据已导出为 JSON 文件<br>💡 提示：将此文件上传到百度网盘可永久保存';
}

function importFromJson(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var content = JSON.parse(e.target.result);
      var records = [];
      if (content.data && Array.isArray(content.data)) {
        records = content.data;
      } else if (Array.isArray(content)) {
        records = content;
      } else {
        showToast('文件格式不正确', 'error');
        return;
      }
      if (records.length === 0) {
        showToast('备份文件中没有数据', 'error');
        return;
      }
      if (!confirm('确定要恢复备份吗？\n备份包含 ' + records.length + ' 条客户数据\n（现有数据不会被删除，只会增加新数据）')) return;
      var imported = 0;
      records.forEach(function(rec) {
        if (!rec.id) return;
        saveToLocal(rec);
        if (cloudOnline) saveToCloud(rec).catch(function(){});
        imported++;
      });
      // 重新加载
      allCustomers = loadFromLocal();
      renderDashboard();
      showToast('✅ 已恢复 ' + imported + ' 条客户数据', 'success');
      document.getElementById('backup-status').innerHTML = '✅ 恢复成功：' + imported + ' 条客户数据已导入';
    } catch(err) {
      showToast('文件解析失败：' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== 功能区多选框 -> 自动填入 textarea ==========
function updateTextarea(textareaId, groupId) {
  var group = document.getElementById(groupId);
  if (!group) return;
  var checked = group.querySelectorAll('input[type="checkbox"]:checked');
  var values = [];
  for (var i = 0; i < checked.length; i++) values.push(checked[i].value);
  var ta = document.getElementById(textareaId);
  if (ta) ta.value = values.join('、');
}

// 根据 textarea 内容反选 checkbox（编辑时回显）
function setCheckboxesFromTextarea(textareaId, groupId) {
  var ta = document.getElementById(textareaId);
  if (!ta || !ta.value) return;
  var group = document.getElementById(groupId);
  if (!group) return;
  var vals = ta.value.split(/[、,，]/).map(function(s){return s.trim();}).filter(Boolean);
  var cbs = group.querySelectorAll('input[type="checkbox"]');
  for (var i = 0; i < cbs.length; i++) {
    cbs[i].checked = vals.indexOf(cbs[i].value) !== -1;
  }
}

  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

window.addEventListener('DOMContentLoaded', function() {

  allCustomers = loadFromLocal();

  checkCloudHealth().then(function(online) {

      return loadFromCloud().then(function(cloudData) {
        if (cloudData && cloudData.length > 0) {
          allCustomers = cloudData;
          // 同步到本地
          localStorage.setItem(LS_KEY, JSON.stringify(cloudData));
        } else {
          // 云端无数据，但本地有，推送本地到云端
          if (allCustomers.length > 0) syncToCloud();
        }
        updateCloudStatus();
        renderDashboard();
        showToast('✅ 云端已连接，共 ' + allCustomers.length + ' 条客户资料', 'success');
      });
    } else {
      updateCloudStatus();
      showToast('⚠️ 云端不可用，使用本地数据（' + allCustomers.length + ' 条）', 'warning');
    }
  }).catch(function() {
    updateCloudStatus();
  });
});
</script>
</body>
</html>
